services:
#-----------------------------------------------
  dockhand:
    image: fnsys/dockhand:latest
    container_name: dockhand
    restart: unless-stopped
    ports:
      - "${DOCKHAND_PORT:-3000}:3000"
    networks:
      general_brg:
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-Europe/London}
    volumes:
      - type: bind
        source: /var/run/docker.sock
        target: /var/run/docker.sock
        bind:
          create_host_path: false
      - type: bind
        source: ${DOCKERCONFIGPATH:-/mnt/apps/docker}/dockhand
        target: /app/data
        bind:
          create_host_path: true
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:3000/api/auth/session >/dev/null || exit 1"]
      interval: 1m
      timeout: 10s
      retries: 3
      start_period: 30s
#-----------------------------------------------
networks:
    general_brg:
      external: true
