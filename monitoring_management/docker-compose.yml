services:
#-----------------------------------------------
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    restart: always
    user: "${PUID:-568}:${PGID:-568}"
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=${PROMETHEUS_RETENTION:-30d}
      - --web.console.libraries=/usr/share/prometheus/console_libraries
      - --web.console.templates=/usr/share/prometheus/consoles
      - --web.enable-lifecycle
    networks:
      general_brg:
    ports:
      - "${DOCKER_BIND_IP:-192.168.213.101}:${PROMETHEUS_WEB_PORT:-9090}:9090"
    volumes:
      - type: bind
        source: ${CONFIG_PATH}/prometheus/prometheus.yml
        target: /etc/prometheus/prometheus.yml
        read_only: true
        bind:
          create_host_path: false
      - type: bind
        source: ${CONFIG_PATH}/prometheus/snmp-targets.yml
        target: /etc/prometheus/snmp-targets.yml
        read_only: true
        bind:
          create_host_path: false
      - type: bind
        source: ${CONFIG_PATH}/prometheus/rules
        target: /etc/prometheus/rules
        read_only: true
        bind:
          create_host_path: false
      - type: bind
        source: ${CONFIG_PATH}/prometheus/data
        target: /prometheus
        bind:
          create_host_path: false
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9090/-/healthy"]
      interval: 1m
      timeout: 10s
      retries: 3
      start_period: 30s
#-----------------------------------------------
  snmp-exporter:
    image: prom/snmp-exporter:latest
    container_name: snmp-exporter
    restart: always
    user: "${PUID:-568}:${PGID:-568}"
    networks:
      general_brg:
    ports:
      - "${DOCKER_BIND_IP:-192.168.213.101}:${SNMP_EXPORTER_WEB_PORT:-9116}:9116"
    command:
      - --config.file=/etc/snmp_exporter/snmp.yml
      - --config.expand-environment-variables
    environment:
      - TZ=${TZ:-UTC}
      - SNMPV3_USERNAME=${SNMPV3_USERNAME}
      - SNMPV3_AUTH_PASSWORD=${SNMPV3_AUTH_PASSWORD}
      - SNMPV3_PRIV_PASSWORD=${SNMPV3_PRIV_PASSWORD}
    volumes:
      - type: bind
        source: ${CONFIG_PATH}/snmp-exporter/snmp.yml
        target: /etc/snmp_exporter/snmp.yml
        read_only: true
        bind:
          create_host_path: false
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9116/metrics"]
      interval: 1m
      timeout: 10s
      retries: 3
      start_period: 15s
#-----------------------------------------------
  unpoller:
    image: ghcr.io/unpoller/unpoller:latest
    container_name: unpoller
    restart: always
    user: "${PUID:-568}:${PGID:-568}"
    networks:
      general_brg:
    ports:
      - "${DOCKER_BIND_IP:-192.168.213.101}:${UNPOLLER_WEB_PORT:-9130}:9130"
    environment:
      - TZ=${TZ:-UTC}
      - UP_INFLUXDB_DISABLE=true
      - UP_POLLER_DEBUG=${UNPOLLER_DEBUG:-false}
      - UP_POLLER_QUIET=${UNPOLLER_QUIET:-false}
      - UP_PROMETHEUS_HTTP_LISTEN=0.0.0.0:9130
      - UP_PROMETHEUS_NAMESPACE=unpoller
      - UP_UNIFI_DYNAMIC=false
      - UP_UNIFI_DEFAULT_URL=${UNIFI_CONTROLLER_URL}
      - UP_UNIFI_DEFAULT_USER=${UNIFI_CONTROLLER_USER}
      - UP_UNIFI_DEFAULT_PASS=${UNIFI_CONTROLLER_PASS}
      - UP_UNIFI_DEFAULT_VERIFY_SSL=${UNIFI_VERIFY_SSL:-false}
      - UP_UNIFI_DEFAULT_SAVE_SITES=true
      - UP_UNIFI_DEFAULT_SAVE_IDS=true
      - UP_UNIFI_DEFAULT_SAVE_DPI=${UNIFI_SAVE_DPI:-false}
      - UP_UNIFI_DEFAULT_SITE_0=${UNIFI_SITE:-all}
    healthcheck:
      test: ["CMD", "/usr/bin/unpoller", "--health"]
      interval: 1m
      timeout: 10s
      retries: 3
      start_period: 30s
#-----------------------------------------------
  grafana:
    image: grafana/grafana-oss:latest
    container_name: grafana
    restart: always
    user: "${PUID:-568}:${PGID:-568}"
    networks:
      general_brg:
    ports:
      - "${DOCKER_BIND_IP:-192.168.213.101}:${GRAFANA_WEB_PORT:-3000}:3000"
    environment:
      - TZ=${TZ:-UTC}
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_PLUGINS_PREINSTALL_AUTO_UPDATE=false
    volumes:
      - type: bind
        source: ${CONFIG_PATH}/grafana/data
        target: /var/lib/grafana
        bind:
          create_host_path: false
      - type: bind
        source: ${CONFIG_PATH}/grafana/provisioning
        target: /etc/grafana/provisioning
        read_only: true
        bind:
          create_host_path: false
      - type: bind
        source: ${CONFIG_PATH}/grafana/dashboards
        target: /var/lib/grafana/dashboards
        read_only: true
        bind:
          create_host_path: false
    depends_on:
      - prometheus
      - unpoller
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:3000/api/health"]
      interval: 1m
      timeout: 10s
      retries: 3
      start_period: 30s
#-----------------------------------------------
networks:
  general_brg:
    external: true
