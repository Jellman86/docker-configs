services:
#-----------------------------------------------
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    restart: unless-stopped
    user: "${PUID:-568}:${PGID:-568}"
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=${PROMETHEUS_RETENTION:-30d}
      - --web.console.libraries=/usr/share/prometheus/console_libraries
      - --web.console.templates=/usr/share/prometheus/consoles
      - --web.enable-lifecycle
    networks:
      general_brg:
    ports:
      - "${PROMETHEUS_WEB_PORT:-9090}:9090"
    volumes:
      - ${CONFIG_PATH}/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ${CONFIG_PATH}/prometheus/snmp-targets.yml:/etc/prometheus/snmp-targets.yml:ro
      - ${CONFIG_PATH}/prometheus/rules:/etc/prometheus/rules:ro
      - ${CONFIG_PATH}/prometheus/data:/prometheus
#-----------------------------------------------
  snmp-exporter:
    image: prom/snmp-exporter:latest
    container_name: snmp-exporter
    restart: unless-stopped
    user: "${PUID:-568}:${PGID:-568}"
    networks:
      general_brg:
    ports:
      - "${SNMP_EXPORTER_WEB_PORT:-9116}:9116"
    command:
      - --config.file=/etc/snmp_exporter/snmp.yml
      - --config.expand-environment-variables
    environment:
      - TZ=${TZ:-UTC}
      - SNMPV3_USERNAME=${SNMPV3_USERNAME}
      - SNMPV3_AUTH_PASSWORD=${SNMPV3_AUTH_PASSWORD}
      - SNMPV3_PRIV_PASSWORD=${SNMPV3_PRIV_PASSWORD}
    volumes:
      - ${CONFIG_PATH}/snmp-exporter/snmp.yml:/etc/snmp_exporter/snmp.yml:ro
#-----------------------------------------------
  unpoller:
    image: ghcr.io/unpoller/unpoller:latest
    container_name: unpoller
    restart: unless-stopped
    user: "${PUID:-568}:${PGID:-568}"
    networks:
      general_brg:
    ports:
      - "${UNPOLLER_WEB_PORT:-9130}:9130"
    environment:
      - TZ=${TZ:-UTC}
      - UP_INFLUXDB_DISABLE=true
      - UP_POLLER_DEBUG=${UNPOLLER_DEBUG:-false}
      - UP_POLLER_QUIET=${UNPOLLER_QUIET:-false}
      - UP_PROMETHEUS_HTTP_LISTEN=0.0.0.0:9130
      - UP_PROMETHEUS_NAMESPACE=unpoller
      - UP_UNIFI_DYNAMIC=false
      - UP_UNIFI_DEFAULT_URL=${UNIFI_CONTROLLER_URL}
      - UP_UNIFI_DEFAULT_USER=${UNIFI_CONTROLLER_USER}
      - UP_UNIFI_DEFAULT_PASS=${UNIFI_CONTROLLER_PASS}
      - UP_UNIFI_DEFAULT_VERIFY_SSL=${UNIFI_VERIFY_SSL:-false}
      - UP_UNIFI_DEFAULT_SAVE_SITES=true
      - UP_UNIFI_DEFAULT_SAVE_IDS=true
      - UP_UNIFI_DEFAULT_SAVE_DPI=${UNIFI_SAVE_DPI:-false}
      - UP_UNIFI_DEFAULT_SITE_0=${UNIFI_SITE:-all}
#-----------------------------------------------
  grafana:
    image: grafana/grafana-oss:latest
    container_name: grafana
    restart: unless-stopped
    user: "${PUID:-568}:${PGID:-568}"
    networks:
      general_brg:
    ports:
      - "${GRAFANA_WEB_PORT:-3000}:3000"
    environment:
      - TZ=${TZ:-UTC}
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - ${CONFIG_PATH}/grafana/data:/var/lib/grafana
      - ${CONFIG_PATH}/grafana/provisioning:/etc/grafana/provisioning:ro
      - ${CONFIG_PATH}/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
      - unpoller
#-----------------------------------------------
networks:
  general_brg:
    external: true
