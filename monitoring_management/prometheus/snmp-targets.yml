# Add SNMP-enabled devices here. The auth/module names come from
# the mounted snmp-exporter/snmp.yml.
#
# For SNMPv3 polling:
# - targets:
#     - 192.168.211.254
#     - switch.example.lan
#   labels:
#     auth: snmpv3_env
#     module: if_mib

- targets:
    - 192.168.211.254
  labels:
    auth: snmpv3_env
    module: if_mib
