# Add SNMP-enabled devices here. The default auth/module names come from
# prometheus/snmp_exporter's bundled snmp.yml.
#
# For SNMP v2c polling with a public read-only community:
# - targets:
#     - 192.168.1.1
#     - switch.example.lan
#   labels:
#     auth: public_v2
#     module: if_mib

- targets:
    - 192.168.1.1
  labels:
    auth: public_v2
    module: if_mib
