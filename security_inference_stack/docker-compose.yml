services:
#-----------------------------------------------
  frigate:
    container_name: frigate
    restart: unless-stopped
    stop_grace_period: 30s # allow enough time to shut down the various services
    image: ghcr.io/blakeblackshear/frigate:stable
    shm_size: "1024mb" # update for your cameras based on calculation above
    devices:
      - /dev/dri:/dev/dri
    volumes:
      - type: bind
        source: /etc/localtime
        target: /etc/localtime
        read_only: true
        bind:
          create_host_path: false
      - type: bind
        source: ${DOCKERCONFIGPATH:-/mnt/apps/docker}/frigate/config
        target: /config
        bind:
          create_host_path: true
      - type: bind
        source: ${DOCKERCONFIGPATH:-/mnt/apps/docker}/frigate/media
        target: /media/frigate
        bind:
          create_host_path: true
      - type: bind
        source: ${SECURITY_EXPORT_PATH:-/mnt/tank/security_inference_stack}/frigate/clips
        target: /media/frigate/clips
        bind:
          create_host_path: true
      - type: bind
        source: ${SECURITY_EXPORT_PATH:-/mnt/tank/security_inference_stack}/frigate/exports
        target: /media/frigate/exports
        bind:
          create_host_path: true
      - type: bind
        source: ${DOCKERCONFIGPATH:-/mnt/apps/docker}/frigate/models
        target: /models
        bind:
          create_host_path: true
      - type: tmpfs
        target: /tmp/cache
        tmpfs:
          size: 1000000000
    networks:
        general_brg:
    ports:
      - "8971:8971"
      - "8554:8554" # RTSP feeds
      - "8555:8555/tcp" # WebRTC over tcp
      - "8555:8555/udp" # WebRTC over udp
    environment:
      - FRIGATE_RTSP_PASSWORD=${FRIGATE_RTSP_PASSWORD}
      - TZ=${TZ:-UTC}
      - LIBVA_DRIVER_NAME=${LIBVA_DRIVER_NAME:-iHD}
    healthcheck:
      test: "curl -f http://localhost:5000/api/version || exit 1"
      interval: 1m
      timeout: 10s
      retries: 3
#-----------------------------------------------
  birdnet-go:
    image: ghcr.io/tphakala/birdnet-go:nightly
    container_name: birdnet-go
    restart: unless-stopped
    ports:
      - "${BN_WEBPORT:-8080}:8080"
    networks:
        general_brg:
    environment:
      - TZ=${TZ:-UTC}
      - BIRDNET_UID=${SECURITY_STACK_UID:-568}
      - BIRDNET_GID=${SECURITY_STACK_GID:-568}
      # BirdNET Configuration
      - BIRDNET_LOCALE=en-uk                      # Locale code (2-10 chars, e.g., "en" or "en-us")
      - BIRDNET_LATITUDE=${BN_LAT}                 # Valid range: -90.0 to 90.0
      - BIRDNET_LONGITUDE=${BN_LONG}              # Valid range: -180.0 to 180.0
      - BIRDNET_SENSITIVITY=1.0                   # Valid range: 0.1 to 1.5 (higher = more sensitive)
      - BIRDNET_THRESHOLD=0.7                     # Valid range: 0.0 to 1.0 (confidence threshold)
      - BIRDNET_OVERLAP=1.5                       # Valid range: 0.0 to 2.9 seconds (audio chunk overlap)
      - BIRDNET_THREADS=2                         # 0 = auto (use all CPUs), or specify number of threads
      - BIRDNET_DEBUG=false                       # Enable debug logging (true/false)
      - BIRDNET_USEXNNPACK=true                   # Use XNNPACK acceleration (true/false)
      # Range Filter Configuration
      - BIRDNET_RANGEFILTER_MODEL=latest
      - BIRDNET_RANGEFILTER_THRESHOLD=0.01
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "test -s /config/config.yaml && grep -q 'name: birdcam' /config/config.yaml && grep -q 'name: nestcam' /config/config.yaml && grep -q 'username: birdnet' /config/config.yaml && curl -f http://localhost:8080/ || exit 1"
        ]
      interval: 1m
      timeout: 10s
      retries: 3
    volumes:
      - type: bind
        source: ${DOCKERCONFIGPATH:-/mnt/apps/docker}/birdnet-go/config
        target: /config
        bind:
          create_host_path: true
      - type: bind
        source: ${DOCKERCONFIGPATH:-/mnt/apps/docker}/birdnet-go/data
        target: /data
        bind:
          create_host_path: true
#-----------------------------------------------
  mosquitto:
    image: eclipse-mosquitto:latest
    container_name: mosquitto
    restart: unless-stopped
    user: ${SECURITY_STACK_UID:-568}:${SECURITY_STACK_GID:-568}
    environment:
      - TZ=${TZ:-UTC}
    networks:
      - general_brg
    ports:
      - "1883:1883"
    volumes:
      - type: bind
        source: ${DOCKERCONFIGPATH:-/mnt/apps/docker}/mosquitto/config
        target: /mosquitto/config
        bind:
          create_host_path: true
      - type: bind
        source: ${DOCKERCONFIGPATH:-/mnt/apps/docker}/mosquitto/data
        target: /mosquitto/data
        bind:
          create_host_path: true
      - type: bind
        source: ${DOCKERCONFIGPATH:-/mnt/apps/docker}/mosquitto/log
        target: /mosquitto/log
        bind:
          create_host_path: true
    healthcheck:
      test: ["CMD-SHELL", "nc -z 127.0.0.1 1883 || exit 1"]
      interval: 1m
      timeout: 10s
      retries: 3
      start_period: 10s
#-----------------------------------------------
  yawamf:
    image: ghcr.io/jellman86/yawamf-monalithic:dev
    container_name: yawamf-monalithic
    restart: unless-stopped
    user: ${SECURITY_STACK_UID:-568}:${SECURITY_STACK_GID:-568}
    devices:
      - /dev/dri:/dev/dri
    networks:
      general_brg:
    volumes:
      - type: bind
        source: ${DOCKERCONFIGPATH:-/mnt/apps/docker}/yawamf/config
        target: /config
        bind:
          create_host_path: true
      - type: bind
        source: ${DOCKERCONFIGPATH:-/mnt/apps/docker}/yawamf/data
        target: /data
        bind:
          create_host_path: true
      - type: bind
        source: ${SECURITY_EXPORT_PATH:-/mnt/tank/security_inference_stack}/YA-WAMF/captures
        target: /data/captures
        bind:
          create_host_path: true
    ports:
      - "9852:8080"
    environment:
      - TZ=${TZ:-UTC}
      - FRIGATE__FRIGATE_URL=${FRIGATE_URL:-http://frigate:5000}
      - FRIGATE__FRIGATE_AUTH_TOKEN=${FRIGATE_AUTH_TOKEN:-}
      - FRIGATE__MQTT_SERVER=${MQTT_SERVER:-mosquitto}
      - FRIGATE__MQTT_PORT=${MQTT_PORT:-1883}
      - FRIGATE__AUDIO_TOPIC=${YAWAMF_AUDIO_TOPIC:-birdnet}
      - SYSTEM__DEBUG_UI_ENABLED=${DEBUG_UI_ENABLED:-true}
      - LIBVA_DRIVER_NAME=${LIBVA_DRIVER_NAME:-iHD}
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8080/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
#-----------------------------------------------
networks:
    general_brg:
      external: true
