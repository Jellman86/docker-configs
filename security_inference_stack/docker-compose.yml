services:
#-----------------------------------------------
  frigate:
    container_name: frigate
    restart: on-failure:5
    stop_grace_period: 30s # allow enough time to shut down the various services
    image: ghcr.io/blakeblackshear/frigate:stable-tensorrt
    shm_size: "1024mb" # update for your cameras based on calculation above
    # NVIDIA GPU access for Docker running inside WSL2. The NVIDIA driver is
    # provided by Windows/WSL; do not mount Intel /dev/dri devices here.
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    volumes:
      - type: bind
        source: /etc/localtime
        target: /etc/localtime
        read_only: true
        bind:
          create_host_path: false
      - type: volume
        source: frigate_config
        target: /config
      - type: volume
        source: frigate_media
        target: /media/frigate
      - type: bind
        source: ${SECURITY_EXPORT_PATH:-/mnt/s/docker/security_inference_stack}/frigate/clips
        target: /media/frigate/clips
        bind:
          create_host_path: true
      - type: bind
        source: ${SECURITY_EXPORT_PATH:-/mnt/s/docker/security_inference_stack}/frigate/exports
        target: /media/frigate/exports
        bind:
          create_host_path: true
      - type: volume
        source: frigate_models
        target: /models
      - type: tmpfs
        target: /tmp/cache
        tmpfs:
          size: 1000000000
    networks:
        general_brg:
    ports:
      - "${DOCKER_BIND_IP:-192.168.213.101}:8971:8971"
      - "${DOCKER_BIND_IP:-192.168.213.101}:8554:8554" # RTSP feeds
      - "${DOCKER_BIND_IP:-192.168.213.101}:8555:8555/tcp" # WebRTC over tcp
      - "${DOCKER_BIND_IP:-192.168.213.101}:8555:8555/udp" # WebRTC over udp
    environment:
      - FRIGATE_RTSP_PASSWORD=${FRIGATE_RTSP_PASSWORD}
      - TZ=${TZ:-UTC}
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,video,utility
    healthcheck:
      test: "curl -f http://localhost:5000/api/version || exit 1"
      interval: 1m
      timeout: 10s
      retries: 3
#-----------------------------------------------
  birdnet-go:
    image: ghcr.io/tphakala/birdnet-go:nightly
    container_name: birdnet-go
    restart: on-failure:5
    ports:
      - "${DOCKER_BIND_IP:-192.168.213.101}:${BN_WEBPORT:-8080}:8080"
    networks:
        general_brg:
    environment:
      - TZ=${TZ:-UTC}
      - BIRDNET_UID=${SECURITY_STACK_UID:-1000}
      - BIRDNET_GID=${SECURITY_STACK_GID:-1000}
      # BirdNET Configuration
      - BIRDNET_LOCALE=en-uk                      # Locale code (2-10 chars, e.g., "en" or "en-us")
      - BIRDNET_LATITUDE=${BN_LAT}                 # Valid range: -90.0 to 90.0
      - BIRDNET_LONGITUDE=${BN_LONG}              # Valid range: -180.0 to 180.0
      - BIRDNET_SENSITIVITY=1.0                   # Valid range: 0.1 to 1.5 (higher = more sensitive)
      - BIRDNET_THRESHOLD=0.7                     # Valid range: 0.0 to 1.0 (confidence threshold)
      - BIRDNET_OVERLAP=1.5                       # Valid range: 0.0 to 2.9 seconds (audio chunk overlap)
      - BIRDNET_THREADS=2                         # 0 = auto (use all CPUs), or specify number of threads
      - BIRDNET_DEBUG=false                       # Enable debug logging (true/false)
      - BIRDNET_USEXNNPACK=true                   # Use XNNPACK acceleration (true/false)
      # Range Filter Configuration               
      - BIRDNET_RANGEFILTER_MODEL=latest
      - BIRDNET_RANGEFILTER_THRESHOLD=0.01
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "test -s /config/config.yaml && grep -q 'name: birdcam' /config/config.yaml && grep -q 'name: nestcam' /config/config.yaml && grep -q 'username: birdnet' /config/config.yaml && curl -f http://localhost:8080/ || exit 1"
        ]
      interval: 1m
      timeout: 10s
      retries: 3
    volumes:
      - type: volume
        source: birdnet_config
        target: /config
      - type: volume
        source: birdnet_data
        target: /data
#-----------------------------------------------
  mosquitto:
    image: eclipse-mosquitto:latest
    container_name: mosquitto
    restart: on-failure:5
    user: ${SECURITY_STACK_UID:-1000}:${SECURITY_STACK_GID:-1000}
    environment:
      - TZ=${TZ:-UTC}
    networks:
      - general_brg
    ports:
      - "${DOCKER_BIND_IP:-192.168.213.101}:1883:1883"
    volumes:
      - type: volume
        source: mosquitto_config
        target: /mosquitto/config
      - type: volume
        source: mosquitto_data
        target: /mosquitto/data
      - type: volume
        source: mosquitto_log
        target: /mosquitto/log
    healthcheck:
      test: ["CMD-SHELL", "nc -z 127.0.0.1 1883 || exit 1"]
      interval: 1m
      timeout: 10s
      retries: 3
      start_period: 10s
#-----------------------------------------------
  yawamf:
    image: ghcr.io/jellman86/yawamf-monalithic:dev
    container_name: yawamf-monalithic
    restart: on-failure:5
    user: ${SECURITY_STACK_UID:-1000}:${SECURITY_STACK_GID:-1000}
    networks:
      general_brg:
    volumes:
      - type: volume
        source: yawamf_config
        target: /config
      - type: volume
        source: yawamf_data
        target: /data
      - type: bind
        source: ${SECURITY_EXPORT_PATH:-/mnt/s/docker/security_inference_stack}/YA-WAMF/captures
        target: /data/captures
        bind:
          create_host_path: true
    # NVIDIA CUDA access for Docker running inside WSL2. Requires NVIDIA
    # Container Toolkit configured in the WSL distro that runs Docker.
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    ports:
      - "${DOCKER_BIND_IP:-192.168.213.101}:9852:8080"
    environment:
      - TZ=${TZ:-UTC}
      - FRIGATE__FRIGATE_URL=${FRIGATE_URL:-http://frigate:5000}
      - FRIGATE__FRIGATE_AUTH_TOKEN=${FRIGATE_AUTH_TOKEN:-}
      - FRIGATE__MQTT_SERVER=${MQTT_SERVER:-mosquitto}
      - FRIGATE__MQTT_PORT=${MQTT_PORT:-1883}
      - FRIGATE__AUDIO_TOPIC=${YAWAMF_AUDIO_TOPIC:-birdnet}
      - SYSTEM__DEBUG_UI_ENABLED=${DEBUG_UI_ENABLED:-true}
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8080/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
#-----------------------------------------------
networks:
    general_brg:
      external: true

volumes:
    frigate_config:
    frigate_media:
    frigate_models:
    birdnet_config:
    birdnet_data:
    mosquitto_config:
    mosquitto_data:
    mosquitto_log:
    yawamf_config:
    yawamf_data:
