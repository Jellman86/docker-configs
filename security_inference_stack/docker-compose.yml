services:
#-----------------------------------------------
  frigate:
    container_name: frigate
    restart: unless-stopped
    stop_grace_period: 30s # allow enough time to shut down the various services
    image: ghcr.io/blakeblackshear/frigate:stable-tensorrt
    shm_size: "1024mb" # update for your cameras based on calculation above
    # NVIDIA GPU access for Docker running inside WSL2. The NVIDIA driver is
    # provided by Windows/WSL; do not mount Intel /dev/dri devices here.
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - ${DOCKERCONFIGPATH}/frigate/config:/config
      - ${DOCKERCONFIGPATH}/frigate/media:/media/frigate
      - ${DOCKERCONFIGPATH}/frigate/models:/models
      - type: tmpfs
        target: /tmp/cache
        tmpfs:
          size: 1000000000
    networks:
        general_brg:
    ports:
      - "8971:8971"
      - "8554:8554" # RTSP feeds
      - "8555:8555/tcp" # WebRTC over tcp
      - "8555:8555/udp" # WebRTC over udp
    environment:
      - FRIGATE_RTSP_PASSWORD=${FRIGATE_RTSP_PASSWORD}
      - TZ=${TZ:-UTC}
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,video,utility
    healthcheck:
      test: "curl -f http://localhost:5000/api/version || exit 1"
      interval: 1m
      timeout: 10s
      retries: 3
#-----------------------------------------------
  birdnet-go:
    image: ghcr.io/tphakala/birdnet-go:nightly
    container_name: birdnet-go
    restart: unless-stopped
    ports:
      - "${BN_WEBPORT:-8080}:8080"
    networks:
        general_brg:
    environment:
      - TZ=${TZ:-UTC}
      - BIRDNET_UID=${SECURITY_STACK_UID:-1000}
      - BIRDNET_GID=${SECURITY_STACK_GID:-1000}
      # BirdNET Configuration
      - BIRDNET_LOCALE=en-uk                      # Locale code (2-10 chars, e.g., "en" or "en-us")
      - BIRDNET_LATITUDE=${BN_LAT}                 # Valid range: -90.0 to 90.0
      - BIRDNET_LONGITUDE=${BN_LONG}              # Valid range: -180.0 to 180.0
      - BIRDNET_SENSITIVITY=1.0                   # Valid range: 0.1 to 1.5 (higher = more sensitive)
      - BIRDNET_THRESHOLD=0.7                     # Valid range: 0.0 to 1.0 (confidence threshold)
      - BIRDNET_OVERLAP=1.5                       # Valid range: 0.0 to 2.9 seconds (audio chunk overlap)
      - BIRDNET_THREADS=0                         # 0 = auto (use all CPUs), or specify number of threads
      - BIRDNET_DEBUG=false                       # Enable debug logging (true/false)
      - BIRDNET_USEXNNPACK=true                   # Use XNNPACK acceleration (true/false)
      # Range Filter Configuration               
      - BIRDNET_RANGEFILTER_MODEL=latest
      - BIRDNET_RANGEFILTER_THRESHOLD=0.01
    healthcheck:
      test: "curl -f http://localhost:8080/ || exit 1"
      interval: 1m
      timeout: 10s
      retries: 3
    volumes:
      - ${DOCKERCONFIGPATH}/birdnet-go/config:/config
      - ${DOCKERCONFIGPATH}/birdnet-go/data:/data
    tmpfs:
      - /config/hls:exec,size=50M,uid=${SECURITY_STACK_UID:-1000},gid=${SECURITY_STACK_GID:-1000},mode=0755
#-----------------------------------------------
  mosquitto:
    image: eclipse-mosquitto:latest
    container_name: mosquitto
    restart: unless-stopped
    user: ${SECURITY_STACK_UID:-1000}:${SECURITY_STACK_GID:-1000}
    environment:
      - TZ=${TZ:-UTC}
    networks:
      - general_brg
    ports:
      - "1883:1883"
    volumes:
      - ${DOCKERCONFIGPATH}/mosquitto/config:/mosquitto/config
      - ${DOCKERCONFIGPATH}/mosquitto/data:/mosquitto/data
      - ${DOCKERCONFIGPATH}/mosquitto/log:/mosquitto/log
#-----------------------------------------------
  yawamf:
    image: ghcr.io/jellman86/yawamf-monalithic:dev
    container_name: yawamf-monalithic
    restart: unless-stopped
    user: ${SECURITY_STACK_UID:-1000}:${SECURITY_STACK_GID:-1000}
    networks:
      general_brg:
    volumes:
      - ${DOCKERCONFIGPATH}/YA-WAMF/config:/config        # Configuration files (config.json)
      - ${DOCKERCONFIGPATH}/YA-WAMF/data:/data 
    # NVIDIA CUDA access for Docker running inside WSL2. Requires NVIDIA
    # Container Toolkit configured in the WSL distro that runs Docker.
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    ports:
      - "9852:8080"
    environment:
      - TZ=${TZ:-UTC}
      - FRIGATE__FRIGATE_URL=${FRIGATE_URL:-http://frigate:5000}
      - FRIGATE__FRIGATE_AUTH_TOKEN=${FRIGATE_AUTH_TOKEN:-}
      - FRIGATE__MQTT_SERVER=${MQTT_SERVER:-mosquitto}
      - FRIGATE__MQTT_PORT=${MQTT_PORT:-1883}
      - SYSTEM__DEBUG_UI_ENABLED=${DEBUG_UI_ENABLED:-true}
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8080/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
#-----------------------------------------------
networks:
    general_brg:
      external: true
