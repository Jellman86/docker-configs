# Managed model routing. Credentials remain in Dockhand secrets/the persistent
# Hermes auth store and are never committed here.
model:
  provider: openai-codex
  default: gpt-5.6-sol

# High is the best always-on quality/latency trade-off; xhigh/max remain
# available as per-session overrides for exceptional work.
agent:
  reasoning_effort: high

# Same-provider degradation path for Sol-specific failures. A genuinely
# independent fallback still requires separate Anthropic/OpenRouter credentials.
fallback_providers:
  - provider: openai-codex
    model: gpt-5.6-terra

# Delegated research and coding use the balanced Terra model.
delegation:
  provider: openai-codex
  model: gpt-5.6-terra
  reasoning_effort: medium

# Context compression uses balanced Terra at medium effort: summaries must
# preserve long-session state, but do not need Sol's latency and token cost.
# Keep other correctness-sensitive side tasks on Sol and route only routine,
# low-risk auxiliary work to Luna.
auxiliary:
  compression:
    provider: openai-codex
    model: gpt-5.6-terra
    reasoning_effort: medium
  vision:
    provider: openai-codex
    model: gpt-5.6-sol
  mcp:
    provider: openai-codex
    model: gpt-5.6-sol
  approval:
    provider: openai-codex
    model: gpt-5.6-sol
  web_extract:
    provider: openai-codex
    model: gpt-5.6-luna
  title_generation:
    provider: openai-codex
    model: gpt-5.6-luna
  skills_hub:
    provider: openai-codex
    model: gpt-5.6-luna

terminal:
  backend: ssh
  cwd: ${HERMES_HOST_WORKDIR}
  timeout: 180
  persistent_shell: true
  file_sync_enabled: true
  file_sync_max_mb: 100

approvals:
  mode: manual
  timeout: 300
  cron_mode: deny
  mcp_reload_confirm: true
  destructive_slash_confirm: true
  deny:
    - "docker run*"
    - "docker pull*"
    - "docker compose pull*"
    - "docker compose up*"
    - "docker start*"
    - "docker stop*"
    - "docker restart*"
    - "docker rm*"
    - "docker container start*"
    - "docker container stop*"
    - "docker container restart*"
    - "docker container rm*"

tool_loop_guardrails:
  warnings_enabled: true
  hard_stop_enabled: true
  warn_after:
    exact_failure: 2
    same_tool_failure: 3
    idempotent_no_progress: 2
  hard_stop_after:
    exact_failure: 5
    same_tool_failure: 8
    idempotent_no_progress: 5

skills:
  external_dirs:
    - /opt/managed-skills
  write_approval: true

memory:
  provider: openviking

security:
  redact_secrets: true

browser:
  inactivity_timeout: 120
  command_timeout: 30
  allow_private_urls: false
  auto_local_for_private_urls: true

mcp_servers:
  rusty_imap:
    url: http://rusty-imap-mcp:8080/mcp
    timeout: 120
    connect_timeout: 60
    supports_parallel_tool_calls: false
    tools:
      include:
        - list_folders
        - search
        - fetch_message
        - list_attachments
        - list_labels
      resources: false
      prompts: false
  playwright:
    url: http://playwright-mcp:8931/mcp
    timeout: 180
    connect_timeout: 60
    supports_parallel_tool_calls: false
    sampling:
      enabled: false
    tools:
      resources: false
      prompts: false
