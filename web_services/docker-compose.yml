services:
#-----------------------------------------------
  npm:
    container_name: npm
    image: 'jc21/nginx-proxy-manager:latest'
    restart: on-failure:5
    ports:
      - 80:80
      - 81:81
      - 443:443
    networks:
      general_brg:
        aliases:
          - nginx-rp
      vpn_stack_brg:
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - npm_data:/data
      - npm_letsencrypt:/etc/letsencrypt
    healthcheck:
      test: ["CMD", "/usr/bin/check-health"]
      interval: 120s
      timeout: 3s
      retries: 3
#-----------------------------------------------
  cloudflared: 
    image: cloudflare/cloudflared 
    container_name: cloudflare-tunnel
    restart: on-failure:5
    networks:
      general_brg:
    command: tunnel run 
    environment: 
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
      - TUNNEL_TOKEN=${TUNNEL_TOKEN}
#-----------------------------------------------
  dockhand:
    image: fnsys/dockhand:latest
    container_name: dockhand
    restart: on-failure:5
    ports:
      - 3000:3000
    networks:
      general_brg:
    environment:
      - PUID=1001
      - PGID=1001
      - TZ=${TZ}
    volumes:
      - type: bind
        source: /var/run/docker.sock
        target: /var/run/docker.sock
        bind:
          create_host_path: false
      - dockhand_data:/app/data
#-----------------------------------------------
  tailscale:
    image: tailscale/tailscale:stable
    container_name: tailscale-exit-node
    hostname: ${TAILSCALE_HOSTNAME}
    restart: on-failure:5
    cap_add:
      - NET_ADMIN
      - NET_RAW
    devices:
      - /dev/net/tun:/dev/net/tun
    sysctls:
      - net.ipv4.ip_forward=1
      - net.ipv6.conf.all.forwarding=1
    networks:
      general_brg:
      vpn_stack_brg:
    environment:
      - TS_AUTHKEY=${TS_AUTHKEY}
      - TS_HOSTNAME=${TAILSCALE_HOSTNAME}
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_USERSPACE=false
      - TS_EXTRA_ARGS=--advertise-exit-node --advertise-routes=${TAILSCALE_ADVERTISE_ROUTES} --accept-dns=false
    volumes:
      - tailscale_state:/var/lib/tailscale
#-----------------------------------------------
networks:
    general_brg:
      external: true
    vpn_stack_brg:
      external: true

volumes:
    npm_data:
      external: true
      name: npm_data
    npm_letsencrypt:
      external: true
      name: npm_letsencrypt
    dockhand_data:
      external: true
      name: dockhand_data
    tailscale_state:
      name: tailscale_state
    
