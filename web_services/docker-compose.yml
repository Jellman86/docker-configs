services:
#-----------------------------------------------
  npm:
    container_name: npm
    image: 'jc21/nginx-proxy-manager:latest'
    restart: always
    ports:
      - 80:80
      - 81:81
      - 443:443
    networks:
      general_brg:
        aliases:
          - nginx-rp
      vpn_stack_brg:
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - npm_data:/data
      - npm_letsencrypt:/etc/letsencrypt
    healthcheck:
      test: ["CMD", "/usr/bin/check-health"]
      interval: 120s
      timeout: 3s
      retries: 3
#-----------------------------------------------
  cloudflared: 
    image: cloudflare/cloudflared 
    container_name: cloudflare-tunnel
    restart: always 
    networks:
      general_brg:
    command: tunnel run 
    environment: 
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
      - TUNNEL_TOKEN=${TUNNEL_TOKEN}
#-----------------------------------------------
networks:
    general_brg:
      external: true
    vpn_stack_brg:
      external: true

volumes:
    npm_data:
      external: true
      name: npm_data
    npm_letsencrypt:
      external: true
      name: npm_letsencrypt
    
