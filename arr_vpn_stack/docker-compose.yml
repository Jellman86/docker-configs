services:
#-----------------------------------------------
  gluetun:
    image: ${GLUETUN_IMAGE:-qmcgaw/gluetun:latest}
    container_name: gluetun
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    networks:
      vpn_stack_brg:
    ports:
      - "${QBITTORRENT_PORT:-5041}:5041/tcp"
      - "${QBITTORRENT_PORT:-5041}:5041/udp"
      - "${QBITTORRENT_WEBUI_PORT:-8081}:8081/tcp"
      - "${PROWLARR_PORT:-9696}:9696/tcp"
      - "${RADARR_PORT:-7878}:7878/tcp"
      - "${SONARR_PORT:-8989}:8989/tcp"
      - "${FLARESOLVERR_PORT:-8191}:8191/tcp"
    volumes:
      - ${DOCKERCONFIGPATH:-/home/jellman86/docker/arrstack}/gluetun:/gluetun
    environment:
      VPN_SERVICE_PROVIDER: ${VPNHOST:-nordvpn}
      VPN_TYPE: ${VPNPROTOCOL:-wireguard}
      WIREGUARD_PRIVATE_KEY: ${WGPRIVKEY:-}
      OPENVPN_USER: ${OPENVPNUSER:-}
      OPENVPN_PASSWORD: ${OPENVPNPASSWORD:-}
      TZ: ${TZ:-Europe/London}
      SERVER_COUNTRIES: ${VPNCOUNTRY:-Netherlands,Switzerland,Sweden,Denmark,Germany,Belgium,France,Ireland,Norway,Spain}
      UPDATER_PERIOD: ${UPDATER_PERIOD:-12h}
      DNS_UPSTREAM_RESOLVER_TYPE: ${DNS_UPSTREAM_RESOLVER_TYPE:-dot}
      DNS_UPSTREAM_RESOLVERS: ${DNS_UPSTREAM_RESOLVERS:-cloudflare}
      DNS_CACHING: ${DNS_CACHING:-on}
      DNS_UPSTREAM_IPV6: ${DNS_UPSTREAM_IPV6:-off}
      BLOCK_MALICIOUS: ${BLOCK_MALICIOUS:-off}
      BLOCK_SURVEILLANCE: ${BLOCK_SURVEILLANCE:-off}
      BLOCK_ADS: ${BLOCK_ADS:-off}
      FIREWALL_INPUT_PORTS: ${FIREWALL_INPUT_PORTS:-5041,8081,9696,7878,8989,8191}
      FIREWALL_OUTBOUND_SUBNETS: ${FIREWALL_OUTBOUND_SUBNETS:-192.168.211.0/24,192.168.212.0/24,192.168.213.0/24,192.168.214.0/24,192.168.215.0/24}
    healthcheck:
      test: ["CMD", "/gluetun-entrypoint", "healthcheck"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
#-----------------------------------------------
  qbittorrent:
    image: ${QBITTORRENT_IMAGE:-lscr.io/linuxserver/qbittorrent:latest}
    container_name: qbittorrent
    restart: unless-stopped
    network_mode: "service:gluetun"
    depends_on:
      gluetun:
        condition: service_healthy
    stop_grace_period: 60s
    environment:
      PUID: ${PUID:-1000}
      PGID: ${PGID:-1000}
      TZ: ${TZ:-Europe/London}
      WEBUI_PORT: 8081
      TORRENTING_PORT: 5041
      DOCKER_MODS: ${QBITTORRENT_DOCKER_MODS:-ghcr.io/vuetorrent/vuetorrent-lsio-mod:latest}
    volumes:
      - ${DOCKERCONFIGPATH:-/home/jellman86/docker/arrstack}/qbittorrent/config:/config
      - ${DOCKERCONFIGPATH:-/home/jellman86/docker/arrstack}/qbittorrent/logs:/logs
      - ${DOWNLOADSPATH:-/mnt/d/downloads/torrents}:/downloads
      - ${DOWNLOADSPATH:-/mnt/d/downloads/torrents}:/torrents
      - ${DOWNLOADSPATH:-/mnt/d/downloads/torrents}/working:/working
      - ${DOWNLOADSPATH:-/mnt/d/downloads/torrents}/complete:/complete
      - ${DOWNLOADSPATH:-/mnt/d/downloads/torrents}/source:/source
    healthcheck:
      test: ["CMD-SHELL", "curl --fail --silent --show-error http://localhost:8081 || exit 1"]
      interval: 1m
      timeout: 10s
      retries: 3
      start_period: 30s
#-----------------------------------------------
  prowlarr:
    image: ${PROWLARR_IMAGE:-lscr.io/linuxserver/prowlarr:latest}
    container_name: prowlarr
    restart: unless-stopped
    network_mode: "service:gluetun"
    depends_on:
      gluetun:
        condition: service_healthy
    environment:
      PUID: ${PUID:-1000}
      PGID: ${PGID:-1000}
      TZ: ${TZ:-Europe/London}
    volumes:
      - ${DOCKERCONFIGPATH:-/home/jellman86/docker/arrstack}/prowlarr/config:/config
      - ${MEDIAPATH:-/mnt/d/media}:/media
      - ${DOWNLOADSPATH:-/mnt/d/downloads/torrents}:/downloads
      - ${DOWNLOADSPATH:-/mnt/d/downloads/torrents}:/torrents
    healthcheck:
      test: ["CMD-SHELL", "curl --fail --silent --show-error http://localhost:9696/ping || exit 1"]
      interval: 1m
      timeout: 10s
      retries: 3
      start_period: 30s
#-----------------------------------------------
  radarr:
    image: ${RADARR_IMAGE:-lscr.io/linuxserver/radarr:latest}
    container_name: radarr
    restart: unless-stopped
    network_mode: "service:gluetun"
    depends_on:
      gluetun:
        condition: service_healthy
    environment:
      PUID: ${PUID:-1000}
      PGID: ${PGID:-1000}
      TZ: ${TZ:-Europe/London}
    volumes:
      - ${DOCKERCONFIGPATH:-/home/jellman86/docker/arrstack}/radarr/config:/config
      - ${DOWNLOADSPATH:-/mnt/d/downloads/torrents}:/downloads
      - ${DOWNLOADSPATH:-/mnt/d/downloads/torrents}:/torrents
      - ${MEDIAPATH:-/mnt/d/media}/video/film:/film-base
    healthcheck:
      test: ["CMD-SHELL", "curl --fail --silent --show-error http://localhost:7878/ping || exit 1"]
      interval: 1m
      timeout: 10s
      retries: 3
      start_period: 30s
#-----------------------------------------------
  sonarr:
    image: ${SONARR_IMAGE:-lscr.io/linuxserver/sonarr:latest}
    container_name: sonarr
    restart: unless-stopped
    network_mode: "service:gluetun"
    depends_on:
      gluetun:
        condition: service_healthy
    environment:
      PUID: ${PUID:-1000}
      PGID: ${PGID:-1000}
      TZ: ${TZ:-Europe/London}
    volumes:
      - ${DOCKERCONFIGPATH:-/home/jellman86/docker/arrstack}/sonarr/config:/config
      - ${DOWNLOADSPATH:-/mnt/d/downloads/torrents}:/downloads
      - ${DOWNLOADSPATH:-/mnt/d/downloads/torrents}:/torrents
      - ${MEDIAPATH:-/mnt/d/media}/video/tv:/tv-base
    healthcheck:
      test: ["CMD-SHELL", "curl --fail --silent --show-error http://localhost:8989/ping || exit 1"]
      interval: 1m
      timeout: 10s
      retries: 3
      start_period: 30s
#-----------------------------------------------
  flaresolverr:
    image: ${FLARESOLVERR_IMAGE:-ghcr.io/flaresolverr/flaresolverr:latest}
    container_name: flaresolverr
    restart: unless-stopped
    network_mode: "service:gluetun"
    depends_on:
      gluetun:
        condition: service_healthy
    environment:
      LOG_LEVEL: ${LOG_LEVEL:-info}
      LOG_HTML: ${LOG_HTML:-false}
      CAPTCHA_SOLVER: ${CAPTCHA_SOLVER:-none}
      TZ: ${TZ:-Europe/London}
    healthcheck:
      test: ["CMD-SHELL", "curl --fail --silent --show-error http://localhost:8191 || exit 1"]
      interval: 1m
      timeout: 10s
      retries: 3
      start_period: 30s
#-----------------------------------------------
  seerr:
    image: ghcr.io/seerr-team/seerr:latest
    init: true
    container_name: seerr
    environment:
      - TZ=${TZ}
      - PORT=5055
    networks:
      vpn_stack_brg:
    ports:
      - 5055:5055
    volumes:
      - ${DOCKERCONFIGPATH}/overseerr:/app/config
    restart: unless-stopped
    healthcheck:
      test: "wget --no-verbose --tries=1 --spider http://localhost:5055/api/v1/settings/public || exit 1"
      start_period: 20s
      interval: 15s
      timeout: 3s
      retries: 3
#-----------------------------------------------
networks:
  vpn_stack_brg:
    name: ${NETWORK:-vpn_stack_brg}
    external: true
