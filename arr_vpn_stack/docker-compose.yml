services:
#-----------------------------------------------
  gluetun:
    image: ${GLUETUN_IMAGE:-qmcgaw/gluetun:latest}
    container_name: gluetun
    restart: always
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    networks:
      vpn_stack_brg:
    ports:
      - "${QBITTORRENT_PORT:-5041}:5041/tcp"
      - "${QBITTORRENT_PORT:-5041}:5041/udp"
      - "${QBITTORRENT_WEBUI_PORT:-8081}:8081/tcp"
    volumes:
      - gluetun_config:/gluetun
    environment:
      VPN_SERVICE_PROVIDER: ${VPNHOST:-nordvpn}
      VPN_TYPE: ${VPNPROTOCOL:-wireguard}
      WIREGUARD_PRIVATE_KEY: ${WGPRIVKEY:-}
      OPENVPN_USER: ${OPENVPNUSER:-}
      OPENVPN_PASSWORD: ${OPENVPNPASSWORD:-}
      TZ: ${TZ:-Europe/London}
      SERVER_COUNTRIES: ${VPNCOUNTRY:-Netherlands,Switzerland,Sweden,Denmark,Germany,Belgium,France,Ireland,Norway,Spain}
      UPDATER_PERIOD: ${UPDATER_PERIOD:-12h}
      DNS_UPSTREAM_RESOLVER_TYPE: ${DNS_UPSTREAM_RESOLVER_TYPE:-dot}
      DNS_UPSTREAM_RESOLVERS: ${DNS_UPSTREAM_RESOLVERS:-cloudflare}
      DNS_CACHING: ${DNS_CACHING:-on}
      DNS_UPSTREAM_IPV6: ${DNS_UPSTREAM_IPV6:-off}
      BLOCK_MALICIOUS: ${BLOCK_MALICIOUS:-off}
      BLOCK_SURVEILLANCE: ${BLOCK_SURVEILLANCE:-off}
      BLOCK_ADS: ${BLOCK_ADS:-off}
      HTTPPROXY: ${HTTPPROXY:-on}
      HTTPPROXY_LISTENING_ADDRESS: ${HTTPPROXY_LISTENING_ADDRESS:-:8888}
      HTTPPROXY_STEALTH: ${HTTPPROXY_STEALTH:-on}
      FIREWALL_INPUT_PORTS: ${FIREWALL_INPUT_PORTS:-5041,8081,8888}
      FIREWALL_OUTBOUND_SUBNETS: ${FIREWALL_OUTBOUND_SUBNETS:-192.168.211.0/24,192.168.212.0/24,192.168.213.0/24,192.168.214.0/24,192.168.215.0/24}
    healthcheck:
      test: ["CMD", "/gluetun-entrypoint", "healthcheck"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
#-----------------------------------------------
  qbittorrent:
    image: ${QBITTORRENT_IMAGE:-lscr.io/linuxserver/qbittorrent:latest}
    container_name: qbittorrent
    restart: on-failure:5
    network_mode: "service:gluetun"
    depends_on:
      gluetun:
        condition: service_healthy
    stop_grace_period: 60s
    environment:
      PUID: ${PUID:-1000}
      PGID: ${PGID:-1000}
      TZ: ${TZ:-Europe/London}
      WEBUI_PORT: 8081
      TORRENTING_PORT: 5041
      DOCKER_MODS: ${QBITTORRENT_DOCKER_MODS:-ghcr.io/vuetorrent/vuetorrent-lsio-mod:latest}
    volumes:
      - qbittorrent_config:/config
      - qbittorrent_logs:/logs
      - type: bind
        source: ${DOWNLOADSPATH:-/mnt/d/downloads/torrents}
        target: /downloads
        bind:
          create_host_path: false
      - type: bind
        source: ${DOWNLOADSPATH:-/mnt/d/downloads/torrents}
        target: /torrents
        bind:
          create_host_path: false
    healthcheck:
      test: ["CMD-SHELL", "curl --fail --silent --show-error http://localhost:8081 || exit 1"]
      interval: 1m
      timeout: 10s
      retries: 3
      start_period: 30s
#-----------------------------------------------
  prowlarr:
    image: ${PROWLARR_IMAGE:-lscr.io/linuxserver/prowlarr:latest}
    container_name: prowlarr
    restart: on-failure:5
    networks:
      vpn_stack_brg:
    ports:
      - "${PROWLARR_PORT:-9696}:9696/tcp"
    environment:
      PUID: ${PUID:-1000}
      PGID: ${PGID:-1000}
      TZ: ${TZ:-Europe/London}
    volumes:
      - prowlarr_config:/config
      - type: bind
        source: ${MEDIAPATH:-/mnt/d/media}
        target: /media
        bind:
          create_host_path: false
      - type: bind
        source: ${DOWNLOADSPATH:-/mnt/d/downloads/torrents}
        target: /downloads
        bind:
          create_host_path: false
      - type: bind
        source: ${DOWNLOADSPATH:-/mnt/d/downloads/torrents}
        target: /torrents
        bind:
          create_host_path: false
    healthcheck:
      test: ["CMD-SHELL", "curl --fail --silent --show-error http://localhost:9696/ping || exit 1"]
      interval: 1m
      timeout: 10s
      retries: 3
      start_period: 30s
#-----------------------------------------------
  radarr:
    image: ${RADARR_IMAGE:-lscr.io/linuxserver/radarr:latest}
    container_name: radarr
    restart: on-failure:5
    networks:
      vpn_stack_brg:
    ports:
      - "${RADARR_PORT:-7878}:7878/tcp"
    environment:
      PUID: ${PUID:-1000}
      PGID: ${PGID:-1000}
      TZ: ${TZ:-Europe/London}
    volumes:
      - radarr_config:/config
      - type: bind
        source: ${DOWNLOADSPATH:-/mnt/d/downloads/torrents}
        target: /downloads
        bind:
          create_host_path: false
      - type: bind
        source: ${DOWNLOADSPATH:-/mnt/d/downloads/torrents}
        target: /torrents
        bind:
          create_host_path: false
      - type: bind
        source: ${MEDIAPATH:-/mnt/d/media}/video/film
        target: /film-base
        bind:
          create_host_path: false
    healthcheck:
      test: ["CMD-SHELL", "curl --fail --silent --show-error http://localhost:7878/ping || exit 1"]
      interval: 1m
      timeout: 10s
      retries: 3
      start_period: 30s
#-----------------------------------------------
  sonarr:
    image: ${SONARR_IMAGE:-lscr.io/linuxserver/sonarr:latest}
    container_name: sonarr
    restart: on-failure:5
    networks:
      vpn_stack_brg:
    ports:
      - "${SONARR_PORT:-8989}:8989/tcp"
    environment:
      PUID: ${PUID:-1000}
      PGID: ${PGID:-1000}
      TZ: ${TZ:-Europe/London}
    volumes:
      - sonarr_config:/config
      - type: bind
        source: ${DOWNLOADSPATH:-/mnt/d/downloads/torrents}
        target: /downloads
        bind:
          create_host_path: false
      - type: bind
        source: ${DOWNLOADSPATH:-/mnt/d/downloads/torrents}
        target: /torrents
        bind:
          create_host_path: false
      - type: bind
        source: ${MEDIAPATH:-/mnt/d/media}/video/tv
        target: /tv-base
        bind:
          create_host_path: false
    healthcheck:
      test: ["CMD-SHELL", "curl --fail --silent --show-error http://localhost:8989/ping || exit 1"]
      interval: 1m
      timeout: 10s
      retries: 3
      start_period: 30s
#-----------------------------------------------
  byparr:
    image: ${BYPARR_IMAGE:-ghcr.io/thephaseless/byparr:latest}
    container_name: byparr
    restart: on-failure:5
    networks:
      vpn_stack_brg:
    depends_on:
      gluetun:
        condition: service_healthy
    environment:
      TZ: ${TZ:-Europe/London}
      PORT: 8191
      PROXY_SERVER: ${BYPARR_PROXY_SERVER:-http://gluetun:8888}
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8191/docs', timeout=5).read()\" || exit 1"]
      interval: 1m
      timeout: 10s
      retries: 3
      start_period: 30s
#-----------------------------------------------
  seerr:
    image: ghcr.io/seerr-team/seerr:latest
    init: true
    container_name: seerr
    environment:
      - TZ=${TZ}
      - PORT=5055
    networks:
      vpn_stack_brg:
    ports:
      - 5055:5055
    volumes:
      - seerr_config:/app/config
    restart: on-failure:5
    healthcheck:
      test: "wget --no-verbose --tries=1 --spider http://localhost:5055/api/v1/settings/public || exit 1"
      start_period: 20s
      interval: 15s
      timeout: 3s
      retries: 3
networks:
  vpn_stack_brg:
    name: ${NETWORK:-vpn_stack_brg}
    external: true

volumes:
  gluetun_config:
    external: true
    name: gluetun_config
  qbittorrent_config:
    external: true
    name: qbittorrent_config
  qbittorrent_logs:
    external: true
    name: qbittorrent_logs
  prowlarr_config:
    external: true
    name: prowlarr_config
  radarr_config:
    external: true
    name: radarr_config
  seerr_config:
    external: true
    name: seerr_config
  sonarr_config:
    external: true
    name: sonarr_config
