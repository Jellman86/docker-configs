name: arr_stack

services:
#-----------------------------------------------
  gluetun:
    image: ${GLUETUN_IMAGE:-qmcgaw/gluetun:latest}
    container_name: gluetun
    restart: on-failure:5
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    networks:
      vpn_stack_brg:
    ports:
      - "${QBITTORRENT_PORT:-5041}:5041/tcp"
      - "${QBITTORRENT_PORT:-5041}:5041/udp"
      - "${QBITTORRENT_WEBUI_PORT:-8081}:8081/tcp"
    volumes:
      - type: bind
        source: ${DOCKERCONFIGPATH:-/mnt/apps/docker}/gluetun
        target: /gluetun
        bind:
          create_host_path: true
    environment:
      VPN_SERVICE_PROVIDER: ${VPNHOST:-nordvpn}
      VPN_TYPE: ${VPNPROTOCOL:-wireguard}
      WIREGUARD_PRIVATE_KEY: ${WGPRIVKEY:-}
      OPENVPN_USER: ${OPENVPNUSER:-}
      OPENVPN_PASSWORD: ${OPENVPNPASSWORD:-}
      TZ: ${TZ:-Europe/London}
      SERVER_COUNTRIES: ${VPNCOUNTRY:-Netherlands,Switzerland,Sweden,Denmark,Germany,Belgium,France,Ireland,Norway,Spain}
      UPDATER_PERIOD: ${UPDATER_PERIOD:-12h}
      DNS_UPSTREAM_RESOLVER_TYPE: ${DNS_UPSTREAM_RESOLVER_TYPE:-dot}
      DNS_UPSTREAM_RESOLVERS: ${DNS_UPSTREAM_RESOLVERS:-cloudflare}
      DNS_CACHING: ${DNS_CACHING:-on}
      DNS_UPSTREAM_IPV6: ${DNS_UPSTREAM_IPV6:-off}
      BLOCK_MALICIOUS: ${BLOCK_MALICIOUS:-off}
      BLOCK_SURVEILLANCE: ${BLOCK_SURVEILLANCE:-off}
      BLOCK_ADS: ${BLOCK_ADS:-off}
      HTTPPROXY: ${HTTPPROXY:-on}
      HTTPPROXY_LISTENING_ADDRESS: ${HTTPPROXY_LISTENING_ADDRESS:-:8888}
      HTTPPROXY_STEALTH: ${HTTPPROXY_STEALTH:-on}
      FIREWALL_INPUT_PORTS: ${FIREWALL_INPUT_PORTS:-5041,8081,8888,9696,7878,8989,8191}
      FIREWALL_OUTBOUND_SUBNETS: ${FIREWALL_OUTBOUND_SUBNETS:-192.168.211.0/24,192.168.212.0/24,192.168.213.0/24,192.168.214.0/24,192.168.215.0/24}
    healthcheck:
      test: ["CMD", "/gluetun-entrypoint", "healthcheck"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
#-----------------------------------------------
  qbittorrent:
    image: ${QBITTORRENT_IMAGE:-lscr.io/linuxserver/qbittorrent:latest}
    container_name: qbittorrent
    restart: on-failure:5
    network_mode: "service:gluetun"
    depends_on:
      gluetun:
        condition: service_healthy
    stop_grace_period: 60s
    environment:
      PUID: ${PUID:-568}
      PGID: ${PGID:-568}
      TZ: ${TZ:-Europe/London}
      WEBUI_PORT: 8081
      TORRENTING_PORT: 5041
      DOCKER_MODS: ${QBITTORRENT_DOCKER_MODS:-ghcr.io/vuetorrent/vuetorrent-lsio-mod:latest}
    volumes:
      - type: bind
        source: ${DOCKERCONFIGPATH:-/mnt/apps/docker}/qbittorrent
        target: /config
        bind:
          create_host_path: true
      - type: bind
        source: ${DOCKERCONFIGPATH:-/mnt/apps/docker}/qbittorrent/logs
        target: /logs
        bind:
          create_host_path: true
      - type: bind
        source: ${DATAPATH:-/mnt/tank}
        target: /data
        bind:
          create_host_path: false
    healthcheck:
      test: ["CMD-SHELL", "curl --fail --silent --show-error http://localhost:8081 || exit 1"]
      interval: 1m
      timeout: 10s
      retries: 3
      start_period: 30s
#-----------------------------------------------
  prowlarr:
    image: ${PROWLARR_IMAGE:-lscr.io/linuxserver/prowlarr:latest}
    container_name: prowlarr
    restart: on-failure:5
    networks:
      vpn_stack_brg:
    ports:
      - "${PROWLARR_PORT:-9696}:9696/tcp"
    environment:
      PUID: ${PUID:-568}
      PGID: ${PGID:-568}
      TZ: ${TZ:-Europe/London}
    volumes:
      - type: bind
        source: ${DOCKERCONFIGPATH:-/mnt/apps/docker}/prowlarr
        target: /config
        bind:
          create_host_path: true
      - type: bind
        source: ${DATAPATH:-/mnt/tank}
        target: /data
        bind:
          create_host_path: false
    healthcheck:
      test: ["CMD-SHELL", "curl --fail --silent --show-error http://localhost:9696/ping || exit 1"]
      interval: 1m
      timeout: 10s
      retries: 3
      start_period: 30s
#-----------------------------------------------
  radarr:
    image: ${RADARR_IMAGE:-lscr.io/linuxserver/radarr:latest}
    container_name: radarr
    restart: on-failure:5
    networks:
      vpn_stack_brg:
    ports:
      - "${RADARR_PORT:-7878}:7878/tcp"
    environment:
      PUID: ${PUID:-568}
      PGID: ${PGID:-568}
      TZ: ${TZ:-Europe/London}
    volumes:
      - type: bind
        source: ${DOCKERCONFIGPATH:-/mnt/apps/docker}/radarr
        target: /config
        bind:
          create_host_path: true
      - type: bind
        source: ${DATAPATH:-/mnt/tank}
        target: /data
        bind:
          create_host_path: false
    healthcheck:
      test: ["CMD-SHELL", "curl --fail --silent --show-error http://localhost:7878/ping || exit 1"]
      interval: 1m
      timeout: 10s
      retries: 3
      start_period: 30s
#-----------------------------------------------
  sonarr:
    image: ${SONARR_IMAGE:-lscr.io/linuxserver/sonarr:latest}
    container_name: sonarr
    restart: on-failure:5
    networks:
      vpn_stack_brg:
    ports:
      - "${SONARR_PORT:-8989}:8989/tcp"
    environment:
      PUID: ${PUID:-568}
      PGID: ${PGID:-568}
      TZ: ${TZ:-Europe/London}
    volumes:
      - type: bind
        source: ${DOCKERCONFIGPATH:-/mnt/apps/docker}/sonarr
        target: /config
        bind:
          create_host_path: true
      - type: bind
        source: ${DATAPATH:-/mnt/tank}
        target: /data
        bind:
          create_host_path: false
    healthcheck:
      test: ["CMD-SHELL", "curl --fail --silent --show-error http://localhost:8989/ping || exit 1"]
      interval: 1m
      timeout: 10s
      retries: 3
      start_period: 30s
#-----------------------------------------------
  byparr:
    image: ${BYPARR_IMAGE:-ghcr.io/thephaseless/byparr:latest}
    container_name: byparr
    restart: on-failure:5
    networks:
      vpn_stack_brg:
    depends_on:
      gluetun:
        condition: service_healthy
    environment:
      TZ: ${TZ:-Europe/London}
      PORT: 8191
      PROXY_SERVER: ${BYPARR_PROXY_SERVER:-http://gluetun:8888}
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS --max-time 30 http://localhost:$${PORT:-8191}/health >/dev/null || exit 1"]
      interval: 15m
      timeout: 30s
      retries: 3
      start_period: 5s
#-----------------------------------------------
  cleanuparr:
    image: ${CLEANUPARR_IMAGE:-ghcr.io/cleanuparr/cleanuparr:latest}
    container_name: cleanuparr
    restart: on-failure:5
    networks:
      vpn_stack_brg:
    ports:
      - "${CLEANUPARR_PORT:-11011}:11011/tcp"
    volumes:
      - type: bind
        source: ${DOCKERCONFIGPATH:-/mnt/apps/docker}/cleanuparr
        target: /config
        bind:
          create_host_path: true
      - type: bind
        source: ${DATAPATH:-/mnt/tank}
        target: /data
        bind:
          create_host_path: false
    environment:
      PORT: 11011
      BASE_PATH: ${CLEANUPARR_BASE_PATH:-}
      PUID: ${PUID:-568}
      PGID: ${PGID:-568}
      UMASK: ${UMASK:-022}
      TZ: ${TZ:-Europe/London}
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS --max-time 10 http://localhost:11011/health >/dev/null || exit 1"]
      interval: 1m
      timeout: 10s
      retries: 3
      start_period: 30s
#-----------------------------------------------
  seerr:
    image: ghcr.io/seerr-team/seerr:latest
    init: true
    container_name: seerr
    user: "${PUID:-568}:${PGID:-568}"
    environment:
      - TZ=${TZ}
      - PORT=5055
    networks:
      vpn_stack_brg:
    ports:
      - "5055:5055"
    volumes:
      - type: bind
        source: ${DOCKERCONFIGPATH:-/mnt/apps/docker}/seerr
        target: /app/config
        bind:
          create_host_path: true
    restart: on-failure:5
    healthcheck:
      test: "wget --no-verbose --tries=1 --spider http://localhost:5055/api/v1/settings/public || exit 1"
      start_period: 20s
      interval: 15s
      timeout: 3s
      retries: 3
networks:
  vpn_stack_brg:
    name: ${NETWORK:-arr_stack_brg}
    external: true
