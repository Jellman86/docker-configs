services:
#-----------------------------------------------
  gluetun:
    image: qmcgaw/gluetun
    restart: unless-stopped
    container_name: gluetun
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    networks:
      vpn_stack_brg:
    ports:
      - 5041:5041/tcp # qbittorrent
      - 5041:5041/udp # qbittorrent
      - 8081:8081/tcp # qbittorrent webui
      - 9696:9696/tcp # prowlarr
      - 7878:7878/tcp # radarr
      - 8989:8989/tcp # sonarr
      - 8191:8191/tcp # flaresolverr
    volumes:
      - ${DOCKERCONFIGPATH}/gluetun:/gluetun
    environment:
      - VPN_SERVICE_PROVIDER=${VPNHOST}
      - VPN_TYPE=${VPNPROTOCOL}
      - OPENVPN_USER=${OPENVPNUSER}
      - OPENVPN_PASSWORD=${OPENVPNPASSWORD}
      - TZ=${TZ}
      - SERVER_COUNTRIES=${VPNCOUNTRY}
      - UPDATER_PERIOD=12h
      - DOT=on
      - DOT_CACHING=on
      - BLOCK_MALICIOUS=off
      - BLOCK_SURVEILLANCE=on
      - BLOCK_ADS=on
      - DOT_PROVIDERS=cloudflare
      # Carve LAN-direct exceptions so containers sharing this network
      # namespace (sonarr/radarr/prowlarr/qbittorrent/flaresolverr) can
      # reach LAN services like Plex notifications, NAS APIs, and the
      # nginx reverse proxy without going through the VPN. Each /24 is
      # listed explicitly rather than collapsed to a /21 to keep the
      # exception scoped to the actually-used subnets.
      #- FIREWALL_OUTBOUND_SUBNETS=192.168.211.0/24,192.168.212.0/24,192.168.213.0/24,192.168.214.0/24,192.168.215.0/24
#-----------------------------------------------
  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest
    container_name: qbittorrent
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
      - WEBUI_PORT=8081
      - TORRENTING_PORT=5041
      - DOCKER_MODS=ghcr.io/vuetorrent/vuetorrent-lsio-mod:latest
    volumes:
      - ${DOCKERCONFIGPATH}/qbittorrent/config:/config
      - ${DOCKERCONFIGPATH}/qbittorrent/logs:/logs
      - ${DOWNLOADSPATH}:/downloads
      - ${DOWNLOADSPATH}:/torrents
    network_mode: "service:gluetun"
    restart: unless-stopped
    healthcheck:
      # Checks if WebUI is responsive.
      test: "curl --fail http://localhost:8081 || exit 1"
      interval: 1m
      timeout: 10s
      retries: 3
      start_period: 30s
#-----------------------------------------------
  prowlarr:
    image: lscr.io/linuxserver/prowlarr:latest
    container_name: prowlarr
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    network_mode: "service:gluetun"
    volumes:
      - ${DOCKERCONFIGPATH}/prowlarr/config:/config
      - ${MEDIAPATH}:/media
      - ${DOWNLOADSPATH}:/downloads
    restart: unless-stopped
    healthcheck:
      test: "curl --fail http://localhost:9696/ping || exit 1"
      interval: 1m
      timeout: 10s
      retries: 3
      start_period: 30s
#-----------------------------------------------
  radarr:
    image: lscr.io/linuxserver/radarr:latest
    container_name: radarr
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    network_mode: "service:gluetun"
    volumes:
      - ${DOCKERCONFIGPATH}/radarr/config:/config
      - ${DOWNLOADSPATH}:/downloads
      - ${MEDIAPATH}/video/film:/film-base
    restart: unless-stopped
    healthcheck:
      test: "curl --fail http://localhost:7878/ping || exit 1"
      interval: 1m
      timeout: 10s
      retries: 3
      start_period: 30s
#-----------------------------------------------
  sonarr:
    image: lscr.io/linuxserver/sonarr:latest
    container_name: sonarr
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    network_mode: "service:gluetun"
    volumes:
      - ${DOCKERCONFIGPATH}/sonarr/config:/config
      - ${DOWNLOADSPATH}:/downloads
      - ${MEDIAPATH}/video/tv:/tv-base
    restart: unless-stopped
    healthcheck:
      test: "curl --fail http://localhost:8989/ping || exit 1"
      interval: 1m
      timeout: 10s
      retries: 3
      start_period: 30s
#-----------------------------------------------
  flaresolverr:
    image: ghcr.io/flaresolverr/flaresolverr:latest
    container_name: flaresolverr
    network_mode: "service:gluetun"
    environment:
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - LOG_HTML=${LOG_HTML:-false}
      - CAPTCHA_SOLVER=${CAPTCHA_SOLVER:-none}
      - TZ=${TZ}
    restart: unless-stopped
    healthcheck:
      test: "curl --fail http://localhost:8191 || exit 1"
      interval: 1m
      timeout: 10s
      retries: 3
      start_period: 30s
#-----------------------------------------------
networks:
  vpn_stack_brg:
    external: true