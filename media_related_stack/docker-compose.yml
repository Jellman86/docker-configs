---
services:
#-----------------------------------------------
    plex:
      image: lscr.io/linuxserver/plex:latest
      container_name: plex
      restart: always
      environment:
        - PUID=${PUID:-568}
        - PGID=${PGID:-568}
        - TZ=${TZ:-Europe/London}
        - PLEX_CLAIM=${PLEX_CLAIM:-}
      volumes:
        - type: bind
          source: ${CONFIG_PATH:-/mnt/apps/docker/pms}
          target: /config
          bind:
            create_host_path: true
        - type: bind
          source: ${MEDIA_PATH:-/mnt/tank/media}
          target: /library
          bind:
            create_host_path: false
        - type: bind
          source: ${MEDIA_PATH:-/mnt/tank/media}/transcode
          target: /transcode
          bind:
            create_host_path: true
      devices:
        - /dev/dri:/dev/dri
      network_mode: host
      healthcheck:
        test: ["CMD-SHELL", "curl -fsS http://localhost:32400/identity >/dev/null || exit 1"]
        interval: 1m
        timeout: 10s
        retries: 3
        start_period: 1m
#-----------------------------------------------
    optimisarr:
      image: ${OPTIMISARR_IMAGE:-ghcr.io/jellman86/optimisarr:dev}
      container_name: optimisarr
      restart: unless-stopped
      # Optimisarr drains active encodes for up to two hours during shutdown. Give the
      # application slightly longer than its own deadline before Docker sends SIGKILL.
      stop_grace_period: 2h5m
      # Attach to the arr apps' external network so Radarr/Sonarr resolve by container
      # name (radarr:7878, sonarr:8989) with no reverse-proxy/DNS hairpin. Keep the
      # project default network too, so NPM still proxies optimisarr.pownet.uk ->
      # optimisarr:8787 and the published host port keeps working.
      networks:
        default:
        arr_stack_brg:
      devices:
        - /dev/dri:/dev/dri
      # TrueNAS SCALE assigns /dev/dri/renderD128 to the render group (GID 107 on
      # this host). The app runs as PUID/PGID, so it needs that supplementary group
      # to use Intel QSV or VA-API rather than falling back to CPU encoding.
      group_add:
        - "${RENDER_GID:-107}"
      ports:
        - "${OPTIMISARR_PORT:-8787}:8787/tcp"
      environment:
        PUID: ${PUID:-568}
        PGID: ${PGID:-568}
        UMASK: ${UMASK:-002}
        TZ: ${TZ:-Europe/London}
        # Use a .NET-native level name. Keep this separate from the legacy
        # OPTIMISARR_LOG_LEVEL=info override, whose lowercase value is invalid here.
        Logging__LogLevel__Default: ${OPTIMISARR_DOTNET_LOG_LEVEL:-Information}
        Logging__LogLevel__System.Net.Http.HttpClient: ${OPTIMISARR_HTTP_LOG_LEVEL:-Warning}
        OPTIMISARR_ADMIN_TOKEN: ${OPTIMISARR_ADMIN_TOKEN:?Set OPTIMISARR_ADMIN_TOKEN in the Dockhand stack environment}
        LIBVA_DRIVER_NAME: ${LIBVA_DRIVER_NAME:-iHD}
      volumes:
        - type: bind
          source: ${DOCKERCONFIGPATH:-/mnt/apps/docker}/optimisarr
          target: /config
          bind:
            create_host_path: true
        - type: bind
          source: ${DATAPATH:-/mnt/tank}
          target: /data
          bind:
            create_host_path: false
        # /work and /trash must share the filesystem with /data so the safe
        # replacement pipeline can use atomic moves instead of copy + delete.
        - type: bind
          source: ${OPTIMISARR_WORKPATH:-/mnt/tank/.optimisarr/work}
          target: /work
          bind:
            create_host_path: true
        - type: bind
          source: ${OPTIMISARR_TRASHPATH:-/mnt/tank/.optimisarr/trash}
          target: /trash
          bind:
            create_host_path: true
      healthcheck:
        test: ["CMD-SHELL", "curl --fail --silent --show-error http://localhost:8787/api/health || exit 1"]
        interval: 1m
        timeout: 10s
        retries: 3
        start_period: 30s
      logging:
        driver: json-file
        options:
          max-size: ${OPTIMISARR_LOG_MAX_SIZE:-10m}
          max-file: ${OPTIMISARR_LOG_MAX_FILES:-3}
#-----------------------------------------------
networks:
  # The arr stack (arr_vpn_stack) owns this network; reference it as external so
  # Optimisarr joins it without trying to create or manage it.
  arr_stack_brg:
    name: ${ARR_NETWORK:-arr_stack_brg}
    external: true
