---
services:
#-----------------------------------------------
    plex:
      image: lscr.io/linuxserver/plex:latest
      container_name: plex
      restart: always
      environment:
        - PUID=568
        - PGID=568
        - TZ=Europe/London
        - PLEX_CLAIM=${PLEX_CLAIM:-}
      volumes:
        - type: bind
          source: ${CONFIG_PATH:-/home/jellman86/docker/media_related_stack}/pms
          target: /config
          bind:
            create_host_path: true
        - type: bind
          source: ${MEDIA_PATH:-/mnt/s/media}
          target: /library
          bind:
            create_host_path: false
        - type: bind
          source: ${MEDIA_PATH:-/mnt/s/media}/transcode
          target: /transcode
          bind:
            create_host_path: true
      devices:
        - /dev/dri:/dev/dri
      network_mode: host
      healthcheck:
        test: ["CMD-SHELL", "curl -fsS http://localhost:32400/identity >/dev/null || exit 1"]
        interval: 1m
        timeout: 10s
        retries: 3
        start_period: 1m
#-----------------------------------------------
