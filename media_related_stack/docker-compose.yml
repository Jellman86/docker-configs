---
services:
#-----------------------------------------------
    plex:
      image: lscr.io/linuxserver/plex:latest
      container_name: plex
      restart: always
      environment:
        - PUID=568
        - PGID=568
        - TZ=Europe/London
        - PLEX_CLAIM=${plexClaim}
      volumes:
        - type: bind
          source: ${appsPath}/pms
          target: /config
          bind:
            create_host_path: true
        - type: bind
          source: ${mediaPath}
          target: /library
          bind:
            create_host_path: false
        - type: bind
          source: ${mediaPath}/transcode
          target: /transcode
          bind:
            create_host_path: true
      devices:
        - /dev/dri:/dev/dri
      network_mode: host
#-----------------------------------------------
